version: "3"

env:
  COMMIT_SHA:
    sh: git rev-parse HEAD
  BASE_IMAGE_NAME: ghcr.io/kvdomingo/banyuhay

tasks:
  default:
    cmd:
      task: up

  setup:
    desc: Setup the project
    cmds:
      - pip install -U prek
      - prek install
      - task: setup-api
      - task: setup-pipelines
      - task: setup-ui

  setup-api:
    desc: Setup backend
    dir: api
    cmd: uv sync --dev --all-extras

  setup-pipelines:
    desc: Setup pipelines
    dir: pipelines
    cmd: uv sync --dev --all-extras

  setup-ui:
    desc: Setup frontend
    dir: ui
    cmd: bun install

  up:
    desc: Build and start containers
    cmd: infisical run -- docker compose up --build --remove-orphans

  stop:
    desc: Stop containers
    cmd: docker compose stop

  logs:
    desc: Follow logs
    interactive: true
    cmd: docker compose logs --follow {{ .CLI_ARGS }}

  restart:
    desc: Restart containers
    cmd: docker compose restart {{ .CLI_ARGS }}

  down:
    desc: Stop and remove containers
    cmd: docker compose down {{ .CLI_ARGS }}

  clean:
    desc: Nuke everything
    cmd: docker compose down --volumes --remove-orphans {{ .CLI_ARGS }}

  exec:
    desc: Execute a command in a running container
    cmd: docker compose exec {{ .CLI_ARGS }}

  makemigrations:
    desc: Generate a new migration revision file
    cmd: task exec -- api uv run alembic revision -m '{{ .CLI_ARGS }}'

  migrate:
    desc: Apply all migrations
    cmd: task exec -- api uv run alembic upgrade head

  unmigrate:
    desc: Undo 1 migration
    cmd: task exec -- api uv run alembic downgrade -1

  psql:
    desc: Attach to the db container and run psql
    interactive: true
    cmd: task exec -- db psql postgres://postgres:postgres@db:5432/postgres

  load-fixtures:
    desc: Load database fixtures
    dir: ./api/app/fixtures
    cmd: psql -f seed-data.sql postgres://postgres:postgres@localhost:5432/postgres

  push-cr:
    desc: Push production image
    cmds:
      - docker push {{ .BASE_IMAGE_NAME }}-api:{{ .COMMIT_SHA }}
      - docker push {{ .BASE_IMAGE_NAME }}-api:latest
      - docker push {{ .BASE_IMAGE_NAME }}-app:{{ .COMMIT_SHA }}
      - docker push {{ .BASE_IMAGE_NAME }}-app:latest

  bake:
    desc: Bake Docker image
    cmd: docker buildx bake --file docker-bake.hcl {{ .CLI_ARGS }} api app

  deploy:
    desc: Deploy to production
    cmds:
      - task: bake
      - task: push-cr
      - helmfile apply -f infra/helm/helmfile.yaml

  tf-init:
    desc: Initialize Terraform
    dir: infra/terraform
    cmd: terraform init

  tf-plan:
    desc: Generate Terraform plan
    dir: infra/terraform
    cmd: terraform plan -out=.tfplan

  tf-apply:
    desc: Apply Terraform plan
    dir: infra/terraform
    cmd: terraform apply .tfplan
