apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "banyuhay.fullname" . }}-test-connection"
  labels:
    {{- include "banyuhay.apiLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "banyuhay.fullname" . }}:{{ .Values.apiService.port }}']
  restartPolicy: Never
