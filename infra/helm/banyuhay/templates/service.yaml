apiVersion: v1
kind: Service
metadata:
  name: '{{ include "banyuhay.fullname" . }}-api'
  labels:
    {{- include "banyuhay.apiLabels" . | nindent 4 }}
spec:
  type: {{ .Values.apiService.type }}
  ports:
    - port: {{ .Values.apiService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "banyuhay.apiSelectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: '{{ include "banyuhay.fullname" . }}-app'
  labels:
    {{- include "banyuhay.appLabels" . | nindent 4 }}
spec:
  type: {{ .Values.appService.type }}
  ports:
    - port: {{ .Values.appService.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "banyuhay.appSelectorLabels" . | nindent 4 }}
