apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "banyuhay.fullname" . }}-init-wait-db"
  labels:
    {{- include "banyuhay.apiLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-4"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  activeDeadlineSeconds: 20
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: "{{ include "banyuhay.fullname" . }}-init-wait-db"
          image: "ghcr.io/kvdomingo/postgresql-pig:18"
          command:
            - /bin/sh
            - -c
            - >
              until pg_isready --host $POSTGRESQL_HOST -U $POSTGRESQL_USERNAME; do
              echo waiting for database;
              sleep 2;
              done;
          envFrom:
            - secretRef:
                name: '{{ .Release.Name }}-secrets'
            - configMapRef:
                name: '{{ .Release.Name }}-configmap-api'
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "banyuhay.fullname" . }}-init-migrate-db"
  labels:
      {{- include "banyuhay.apiLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-3"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  activeDeadlineSeconds: 180
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: "{{ include "banyuhay.fullname" . }}-init-migrate-db"
          image: "{{ .Values.apiImage.repository }}:{{ .Values.apiImage.tag }}"
          command:
            - /bin/sh
            - -c
            - /app/.venv/bin/alembic upgrade head
          envFrom:
            - secretRef:
                name: '{{ .Release.Name }}-secrets'
            - configMapRef:
                name: '{{ .Release.Name }}-configmap-api'
      {{- with .Values.affinity }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}
---
{{- if not .Values.disableFixtureLoading }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "banyuhay.fullname" . }}-init-load-db-fixtures"
  labels:
      {{- include "banyuhay.apiLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-2"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  activeDeadlineSeconds: 120
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: "{{ include "banyuhay.fullname" . }}-init-load-db-fixtures"
          image: "{{ .Values.apiImage.repository }}:{{ .Values.apiImage.tag }}"
          command:
            - /bin/sh
            - -c
            - >
              psql
              "postgres://${POSTGRESQL_USERNAME}:${POSTGRESQL_PASSWORD}@${POSTGRESQL_HOST}:5432/${POSTGRESQL_DATABASE}"
              -f
              /app/app/fixtures/seed-data.sql
          envFrom:
            - secretRef:
                name: '{{ .Release.Name }}-secrets'
            - configMapRef:
                name: '{{ .Release.Name }}-configmap-api'
      {{- with .Values.affinity }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
