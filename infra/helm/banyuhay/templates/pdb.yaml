{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: '{{ include "banyuhay.fullname" . }}-api'
  labels:
    {{- include "banyuhay.apiLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "banyuhay.apiSelectorLabels" . | nindent 6 }}
  minAvailable: {{ .Values.pdb.minAvailable }}
{{- end }}
---
{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: '{{ include "banyuhay.fullname" . }}-app'
  labels:
    {{- include "banyuhay.appLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "banyuhay.appSelectorLabels" . | nindent 6 }}
  minAvailable: {{ .Values.pdb.minAvailable }}
{{- end }}
