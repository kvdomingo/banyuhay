apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{ .Release.Name }}-configmap-api'
  labels:
    {{- include "banyuhay.apiLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  POSTGRESQL_USERNAME: "banyuhay"
  POSTGRESQL_DATABASE: "banyuhay"
  POSTGRESQL_HOST: "10.10.10.103"
  APP_HOST: "https://banyuh.ai"
  API_HOST: 'http://{{ include "banyuhay.fullname" . }}-api:8000'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{ .Release.Name }}-configmap-app'
  labels:
    {{- include "banyuhay.appLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  VITE_APP_HOST: "https://banyuh.ai"
  API_HOST: 'http://{{ include "banyuhay.fullname" . }}-api:8000'
  PORT: {{ .Values.appService.port }}
  ASSET_PRELOAD_VERBOSE_LOGGING: "true"
