apiVersion: v1
kind: Secret
metadata:
  name: '{{ .Release.Name }}-secrets-api'
  labels:
    {{- include "banyuhay.apiLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
    avp.kubernetes.io/path: kv/data/lab/banyuhay
stringData:
  {{- toYaml .Values.apiEnv | nindent 2 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: '{{ .Release.Name }}-secrets-app'
  labels:
    {{- include "banyuhay.appLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
    avp.kubernetes.io/path: kv/data/lab/banyuhay
stringData:
  {{- toYaml .Values.appEnv | nindent 2 }}
