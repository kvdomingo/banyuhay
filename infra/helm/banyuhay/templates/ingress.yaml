{{- if .Values.apiIngress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: '{{ include "banyuhay.fullname" . }}-api'
  labels:
    {{- include "banyuhay.apiLabels" . | nindent 4 }}
  {{- with .Values.apiIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.apiIngress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.apiIngress.tls }}
  tls:
    {{- range .Values.apiIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.apiIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: '{{ include "banyuhay.fullname" $ }}-api'
                port:
                  number: {{ $.Values.apiService.port }}
          {{- end }}
    {{- end }}
{{- end }}
---
{{- if .Values.appIngress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
