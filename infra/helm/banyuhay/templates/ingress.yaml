spec:
  {{- with .Values.appIngress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.appIngress.tls }}
  tls:
    {{- range .Values.appIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.appIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
